name: Build and Release APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Get current date
      id: date
      run: echo "DATE=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Swardhun-${{ steps.date.outputs.DATE }}.apk

    - name: Delete old release if exists
      run: |
        gh release delete latest --yes || true
        git push origin :refs/tags/latest || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: "Swardhun Latest Build"
        files: app/build/outputs/apk/debug/Swardhun-*.apk
        body: |
          ## Latest Swardhun Build
          
          **Auto-generated on:** ${{ steps.date.outputs.DATE }}
          
          ### Download
          Click on the APK file below to download.
          
          ### Installation
          1. Download the APK
          2. Enable "Install from unknown sources"
          3. Install and enjoy!
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
